<text class="text muted label" transform="translate(20 221.0) rotate(-90)" text-anchor="middle">Recall@10</text>
<path class="series frozen" d="M 74.0 310.5 L 158.0 280.6 L 242.0 237.9 L 326.0 216.0 L 410.0 201.8 L 494.0 195.2 L 578.0 180.4 L 662.0 177.0"/>
<text class="text label" x="674" y="181.0">54.9%</text>
