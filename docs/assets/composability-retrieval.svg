<svg xmlns="http://www.w3.org/2000/svg" width="860" height="448" viewBox="0 0 860 448" role="img" aria-labelledby="title desc">
<title id="title">Compositional retrieval across three training objectives</title>
<desc id="desc">Recall at five as one to fourteen concept attributes are composed. Reverse-ridge orthogonality performs best, followed by group-mean orthogonality and contrastive-only training.</desc>
