<text class="text muted small" x="62" y="91.8" text-anchor="end">80%</text>
<line class="axis" x1="74" y1="70" x2="74" y2="372"/>
<line class="axis" x1="74" y1="372" x2="662" y2="372"/>
<text class="text muted small" x="74.0" y="394" text-anchor="middle">1</text>
